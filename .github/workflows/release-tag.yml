name: Release tag

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install runtime
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # recommended for release builds

      - name: Install
        run: npm ci

      - name: Checks
        run: npm run type-check

      - name: Unit tests
        run: npm run coverage

      - name: Build
        run: npm run build

      # Authenticates via npm trusted publisher (OIDC) — no NPM_TOKEN needed.
      # npmjs.com package settings must list workflow filename: release-tag.yml
      - name: Publish to npm
        run: npm publish

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
